<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Job Application</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1 class="header">Add Job Application</h1>

    <div id="login-section" class="section">
      <p class="info-text">Please login first to add applications</p>
      <input
        type="email"
        id="login-email"
        placeholder="Email"
        class="input-field"
      />
      <input
        type="password"
        id="login-password"
        placeholder="Password"
        class="input-field"
      />
      <button id="login-btn" class="btn btn-primary">Login</button>
      <div id="login-error" class="error-message"></div>
    </div>

    <div id="form-section" class="section hidden">
      <form id="application-form">
        <div class="form-group">
          <label for="company">Company *</label>
          <input
            type="text"
            id="company"
            placeholder="e.g., Google"
            class="input-field"
            required
          />
        </div>

        <div class="form-group">
          <label for="position">Position *</label>
          <input
            type="text"
            id="position"
            placeholder="e.g., Software Engineer"
            class="input-field"
            required
          />
        </div>

        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" class="input-field">
            <option value="wishlist">Wishlist</option>
            <option value="applied" selected>Applied</option>
            <option value="interview">Interview</option>
            <option value="offer">Offer</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>

        <div class="form-group">
          <label for="job_url">Job URL</label>
          <input
            type="url"
            id="job_url"
            placeholder="Auto-filled from current tab"
            class="input-field"
          />
        </div>

        <div class="form-group">
          <label for="location">Location</label>
          <input
            type="text"
            id="location"
            placeholder="e.g., San Francisco, CA"
            class="input-field"
          />
        </div>

        <div class="form-group">
          <label for="salary_range">Salary Range</label>
          <input
            type="text"
            id="salary_range"
            placeholder="e.g., $100k - $150k"
            class="input-field"
          />
        </div>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea
            id="notes"
            rows="3"
            placeholder="Any additional notes..."
            class="input-field"
          ></textarea>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary">
          Add Application
        </button>
        <button type="button" id="logout-btn" class="btn btn-secondary">
          Logout
        </button>

        <div id="success-message" class="success-message hidden">
          Application added successfully!
        </div>
        <div id="error-message" class="error-message"></div>
      </form>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
